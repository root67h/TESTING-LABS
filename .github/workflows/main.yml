name: Simple-RDP

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest

    steps:
      # -------------------------------
      # Setup User (NO FAIL VERSION)
      # -------------------------------
      - name: Setup RDP User
        shell: pwsh
        run: |
          $user = "runneradmin"
          $pass = "Str@ngeRDP2026"

          Write-Host "Setting up user..."

          cmd /c "net user $user $pass /add"
          cmd /c "net user $user $pass"
          cmd /c "net localgroup administrators $user /add"

          echo "RDP_USER=$user" >> $env:GITHUB_ENV
          echo "RDP_PASS=$pass" >> $env:GITHUB_ENV

      # -------------------------------
      # Enable RDP
      # -------------------------------
      - name: Enable RDP
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" -Value 0

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      # -------------------------------
      # Install Tailscale
      # -------------------------------
      - name: Install Tailscale
        shell: pwsh
        run: |
          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
          $path = "$env:TEMP\tailscale.msi"

          Invoke-WebRequest -Uri $url -OutFile $path
          Start-Process msiexec.exe -ArgumentList "/i `"$path`" /quiet /norestart" -Wait

      # -------------------------------
      # Connect Tailscale
      # -------------------------------
      - name: Connect Tailscale
        shell: pwsh
        run: |
          $authKey = "${{ secrets.TAILSCALE_AUTH_KEY }}"

          if (-not $authKey) {
            Write-Host "ERROR: Add TAILSCALE_AUTH_KEY in secrets"
            exit 1
          }

          & "$env:ProgramFiles\Tailscale\tailscale.exe" up `
            --auth-key="$authKey" `
            --hostname="gh-rdp-$env:GITHUB_RUN_ID"

          Start-Sleep 10

          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4

          if (-not $ip) {
            Write-Host "ERROR: No IP"
            exit 1
          }

          echo "TAILSCALE_IP=$ip" >> $env:GITHUB_ENV

      # -------------------------------
      # Show Details
      # -------------------------------
      - name: Show RDP Details
        shell: pwsh
        run: |
          Write-Host "======================"
          Write-Host "IP   : $env:TAILSCALE_IP"
          Write-Host "USER : $env:RDP_USER"
          Write-Host "PASS : $env:RDP_PASS"
          Write-Host "======================"

          while ($true) { Start-Sleep 300 }
